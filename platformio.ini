; PlatformIO Project Configuration File
;
; ターゲットの切り替え方法:
;   M5Capsule (M5StampS3)       → [env:m5stack-stamps3] を使用
;   ATOM Lite + TFカードリーダー → [env:m5stack-atom] を使用

[common]
framework = arduino
monitor_speed = 115200
board_build.partitions = huge_app.csv
lib_deps =
    m5stack/M5Unified@^0.1.10
    fastled/FastLED@^3.6.0
    ESP32 BLE Arduino

[env:m5stack-stamps3]
platform = espressif32
board = m5stack-stamps3
extends = common
build_flags =
    -DPIN_LED=21
    -DSD_CS_PIN=11
    -DSD_SCK=14
    -DSD_MISO=39
    -DSD_MOSI=12

[env:m5stack-atom]
platform = espressif32
board = m5stack-atom
extends = common
build_flags =
    -DPIN_LED=27
    -DSD_CS_PIN=4
    -DSD_SCK=23
    -DSD_MISO=33
    -DSD_MOSI=19
